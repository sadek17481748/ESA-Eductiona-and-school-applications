<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESA — Register (structure)</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="site-header">
    <div class="header-geometry" aria-hidden="true"></div>
    <div class="header-inner">
      <div class="brand">
        <a href="index.html" style="color:inherit;text-decoration:none;">
          <span class="brand-mark">ESA</span>
          <span class="brand-tag">Education &amp; Schooling Applications</span>
        </a>
      </div>
      <nav class="top-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="login.html">Log in</a>
        <a class="btn-outline" href="register.html" aria-current="page">Register</a>
      </nav>
    </div>
  </header>

  <div class="page-wrap">
    <main id="main" class="main-single">
      <section class="panel">
        <h1>Register</h1>
        <div class="accent-bar"></div>
        <p class="lead">Field groups for account creation (structure only).</p>
        <form class="form-stack" action="#" method="get">
          <div class="field">
            <label for="reg-user">Username</label>
            <input id="reg-user" name="username" type="text" autocomplete="username" readonly>
          </div>
          <div class="field">
            <label for="reg-email">Email</label>
            <input id="reg-email" name="email" type="email" autocomplete="email" readonly>
          </div>
          <div class="field">
            <label for="reg-pass">Password</label>
            <input id="reg-pass" name="password" type="password" autocomplete="new-password" readonly>
          </div>
          <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role" disabled>
              <option>Super Admin</option>
              <option>School Admin</option>
              <option>Teacher</option>
              <option selected>Student</option>
              <option>Parent</option>
            </select>
          </div>
          <button type="button" class="btn-primary">Create account</button>
        </form>
        <p class="lead" style="margin-top:1.25rem;margin-bottom:0;">
          <a href="login.html">Already have an account?</a>
        </p>
      </section>
    </main>
    <footer class="site-footer">ESA — static HTML/CSS structure prototype</footer>
  </div>
</body>
</html>
